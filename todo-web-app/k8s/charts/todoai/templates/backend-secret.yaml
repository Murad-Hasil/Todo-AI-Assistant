# [Task]: T-4.9 — Kubernetes Secret for sensitive backend credentials
# Values sourced from secrets.values.yaml (not committed to VCS)
apiVersion: v1
kind: Secret
metadata:
  name: todoai-backend-secret
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: todoai-backend
    app.kubernetes.io/part-of: todoai
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.backend.secret.DATABASE_URL | quote }}
  BETTER_AUTH_SECRET: {{ .Values.backend.secret.BETTER_AUTH_SECRET | quote }}
  GROQ_API_KEY: {{ .Values.backend.secret.GROQ_API_KEY | quote }}
  CORS_ORIGINS: {{ .Values.backend.secret.CORS_ORIGINS | quote }}
