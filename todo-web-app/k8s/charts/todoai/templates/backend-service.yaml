# [Task]: T-4.5 — Backend NodePort Service
# In-cluster DNS: http://todoai-backend-svc:8000
# External host access: http://$(minikube ip):30800
apiVersion: v1
kind: Service
metadata:
  name: todoai-backend-svc
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: todoai-backend
    app.kubernetes.io/part-of: todoai
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: todoai-backend
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      nodePort: {{ .Values.backend.nodePort }}
      protocol: TCP
