# [Task]: T-4.6 — Frontend NodePort Service
# Access via: minikube service todoai-frontend
# Or directly: http://$(minikube ip):30300
apiVersion: v1
kind: Service
metadata:
  name: todoai-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: todoai-frontend
    app.kubernetes.io/part-of: todoai
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: todoai-frontend
  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      nodePort: {{ .Values.frontend.nodePort }}
      protocol: TCP
