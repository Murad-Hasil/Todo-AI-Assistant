# [Task]: T-5.3.4 — binds reminders topic to todo-notification-service (research R-004)
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: reminders-subscription
  namespace: default
spec:
  pubsubname: todoai-pubsub
  topic: reminders
  routes:
    default: /on-reminder
scopes:
  - todo-notification-service
